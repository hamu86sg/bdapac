name: Daily APAC Regulatory Flash Check

on:
  schedule:
    # Daily 23:00 UTC = Daily 07:00 SGT (UTC+8)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      groq_api_key:
        description: 'Groq API Key (paste gsk_... key here for manual runs)'
        required: false
        type: string

jobs:
  daily-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily flash check
        run: python main_daily.py
        env:
          GROQ_API_KEY:    ${{ github.event.inputs.groq_api_key || secrets.GROQ_API_KEY }}
          RECIPIENT_EMAIL: "hamilton.lau@wwt.com"
          RESEND_API_KEY:  ${{ secrets.RESEND_API_KEY }}

      - name: Upload flash PDF (if generated)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: APAC-Reg-Flash-${{ github.run_number }}
          path: "APAC_Reg_Flash_*.pdf"
          retention-days: 30

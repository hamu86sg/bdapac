name: Weekly APAC Regulatory Report

on:
  schedule:
    # Saturday 04:00 UTC = Saturday 12:00 SGT (UTC+8)
    - cron: '0 4 * * 6'
  workflow_dispatch:   # allows manual trigger for testing

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly report
        run: python main_weekly.py
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}   # optional — skipped if blank

      - name: Upload PDF report
        uses: actions/upload-artifact@v4
        with:
          name: APAC-Reg-Memo-${{ github.run_number }}
          path: "APAC_Reg_Memo_*.pdf"
          retention-days: 90
